<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fun Design F&Z ERP</title>
    <link rel="icon" type="image/png" href="/logo.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #f8fafc;
      }
      @media print {
        @page { margin: 1cm; size: landscape; }
        .no-print, header, aside, .toast-container { display: none !important; }
        
        body, #root, main, .overflow-hidden, .overflow-auto {
          background-color: white !important;
          margin: 0 !important;
          padding: 0 !important;
          height: auto !important;
          width: 100% !important;
          overflow: visible !important;
          position: static !important;
        }

        /* Ensure tables print fully */
        table {
          width: 100% !important;
          border-collapse: collapse !important;
          page-break-inside: auto;
        }
        tr { page-break-inside: avoid; page-break-after: auto; }
        th, td {
          border: 1px solid #ddd !important;
          padding: 8px !important;
          color: black !important;
        }
        
        /* Text colors fix */
        * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; color: black; }
        .text-emerald-600, .text-emerald-700 { color: #059669 !important; }
        .text-red-600, .text-red-700 { color: #dc2626 !important; }
        .bg-emerald-50 { background-color: #ecfdf5 !important; }
        .bg-red-50 { background-color: #fef2f2 !important; }
      }
    </style>

  }
}
</script>
